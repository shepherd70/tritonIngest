url: https://shepherd70.github.io/tritonIngest/

template:
  bootstrap: 5

reference:
- title: Read & dates
  desc: Read tabular sources as all-text so fragile notation survives; verify the file's type from its bytes; coerce mixed date encodings.
  contents:
  - read_tabular
  - sniff_format
  - coerce_excel_date
- title: Worksheets
  desc: Enumerate workbook sheets and formula/merge features, then read selected or all sheets.
  contents:
  - list_sheets
  - inspect_workbook
  - read_all_sheets
- title: Clean structural junk
  desc: Recover the real header row and strip blank rows / spacer columns / label rows from dirty workbooks.
  contents:
  - clean_table
  - find_header_row
  - drop_blank_rows
  - drop_blank_cols
  - drop_label_rows
- title: Reshape layout
  desc: Detect long / wide / transposed layout and reshape to long.
  contents:
  - detect_layout
  - melt_wide
  - looks_transposed
  - transpose_table
- title: Column contracts & mapping
  desc: Declare a schema, auto-map source columns onto it by exact / synonym / fuzzy match, coerce, and complete.
  contents:
  - cf_field
  - as_contract
  - contract_fields
  - contract_fingerprint
  - auto_map
  - apply_column_map
  - complete_to_contract
  - contract_is_ready
  - type_matches
  - is_value_like
- title: Mapping profiles
  desc: Save, load, and manage named JSON column-mapping profiles for reuse across runs.
  contents:
  - save_mapping_profile
  - load_mapping_profile
  - list_mapping_profiles
  - delete_mapping_profile
  - mapping_profiles_dir
  - upgrade_mapping_profile
- title: Lab values
  desc: Parse non-detects, substitute working values, and reconcile units.
  contents:
  - parse_censored
  - apply_substitution
  - working_values
  - convert_units
- title: Validation (generic)
  desc: Domain-agnostic schema checks that each return failures, then abort once with the collected set.
  contents:
  - check_required_columns
  - check_column_types
  - check_no_na
  - check_unique
  - check_range
  - check_monotonic
  - validate_against_contract
  - validation_abort
- title: Cache
  desc: Materialise the canonical object to a fingerprinted fast-reload cache.
  contents:
  - write_cache
  - read_cache
  - cached_ingest
  - cache_dir
- title: Canonical artifacts & diagnostics
  desc: Write and verify language-neutral canonical bundles and structured diagnostics.
  contents:
  - write_canonical_bundle
  - read_canonical_bundle
  - tabular_diagnostic
